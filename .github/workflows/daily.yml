name: Daily portfolio snapshot

on:
  schedule:
    # Weekdays. Times are UTC; ET shifts ~1h with daylight saving.
    - cron: "5 14 * * 1-5"    # ~10am ET — intraday "open" snapshot
    - cron: "5 21 * * 1-5"    # ~5pm ET — overwrites the day's row with the close
  workflow_dispatch:        # lets you trigger it by hand from the Actions tab

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Record snapshot
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python jobs/snapshot.py
